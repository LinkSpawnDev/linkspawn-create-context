name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # goreleaser needs full history for the changelog
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      # Full verification gate — goreleaser only runs if all of this is clean.
      - name: gofmt
        run: test -z "$(gofmt -l .)"
      - name: vet
        run: go vet ./...
      - name: test
        run: go test ./...
      # Mint a short-lived (1h) installation token for the tap push — no
      # long-lived PAT. The app private key only mints tokens scoped to
      # homebrew-tap; it cannot touch anything else.
      - name: mint tap token
        id: tap-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: LinkSpawnDev
          repositories: homebrew-tap
      - name: goreleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ steps.tap-token.outputs.token }}
